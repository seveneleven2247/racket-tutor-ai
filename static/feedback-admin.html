<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CODEBRIDGE Admin Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=purple-11" />
    <link rel="shortcut icon" type="image/svg+xml" href="/favicon.svg?v=purple-11" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="admin-page">
      <header class="admin-header">
        <div class="brand">
          <div class="brand-mark">11</div>
          <div>
            <h1>CODEBRIDGE</h1>
            <p>Admin Dashboard</p>
          </div>
        </div>
        <div class="admin-actions">
          <a class="secondary-button admin-link" href="/">Back to Course</a>
          <button id="adminRefresh" class="primary-button" type="button">Refresh</button>
        </div>
      </header>

      <section id="adminGate" class="onboarding-panel" hidden>
        <div class="onboarding-inner">
          <p class="eyebrow">Admin Required</p>
          <h2>Log in as Elven</h2>
          <p>Only administrator accounts can view user activity and site feedback.</p>
          <p id="adminGateMessage" class="access-message"></p>
        </div>
      </section>

      <section id="adminContent" class="admin-content" hidden>
        <section class="admin-section">
          <div class="section-heading">
            <div>
              <p class="eyebrow">User Monitor</p>
              <h2>Registered Users</h2>
            </div>
            <p id="onlineWindow" class="body-text"></p>
          </div>
          <div id="userStats" class="admin-stat-grid"></div>
          <div class="user-table-wrap">
            <table class="admin-user-table">
              <thead>
                <tr>
                  <th>User</th>
                  <th>Status</th>
                  <th>Registered</th>
                  <th>Last active</th>
                  <th>Course</th>
                  <th>Sessions</th>
                  <th>Submissions</th>
                </tr>
              </thead>
              <tbody id="adminUserList"></tbody>
            </table>
          </div>
        </section>

        <section class="admin-section">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Feedback Tracker</p>
              <h2>Site Feedback</h2>
            </div>
          </div>
          <div class="admin-toolbar">
            <label>
              <span>Status</span>
              <select id="feedbackStatusFilter">
                <option value="">All feedback</option>
                <option value="open">Open</option>
                <option value="reviewing">Reviewing</option>
                <option value="fixed">Fixed</option>
                <option value="closed">Closed</option>
              </select>
            </label>
            <p id="feedbackCount" class="body-text"></p>
          </div>

          <div id="adminFeedbackList" class="admin-feedback-list"></div>
        </section>
      </section>
    </main>

    <script src="/feedback-admin.js"></script>
  </body>
</html>
