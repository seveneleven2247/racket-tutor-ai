<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Racket Tutor AI · Access</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="access-page">
    <main class="access-card">
      <div class="brand">
        <div class="brand-mark">λ</div>
        <div>
          <h1>Racket Tutor AI</h1>
          <p>Enter the access code</p>
        </div>
      </div>
      <form id="accessForm" class="access-form">
        <label>
          <span>Access Code</span>
          <input id="accessCode" type="password" autocomplete="current-password" autofocus />
        </label>
        <button class="primary-button" type="submit">Enter Site</button>
      </form>
      <p id="accessMessage" class="access-message"></p>
    </main>
    <script>
      const form = document.querySelector("#accessForm");
      const message = document.querySelector("#accessMessage");
      async function submitAccessCode(code) {
        message.textContent = "Verifying...";
        const response = await fetch("/api/access", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ code }),
        });
        if (response.ok) {
          localStorage.setItem("racketTutor.accessCode", code);
          window.location.href = "/";
          return;
        }
        message.textContent = "The access code is incorrect.";
      }

      const params = new URLSearchParams(window.location.search);
      const accessFromUrl = params.get("access");
      if (accessFromUrl) {
        document.querySelector("#accessCode").value = accessFromUrl;
        submitAccessCode(accessFromUrl);
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        submitAccessCode(document.querySelector("#accessCode").value.trim());
      });
    </script>
  </body>
</html>
